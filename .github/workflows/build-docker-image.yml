name: Publish docker image
description: 'Publishes a multi-arch docker image'

# Images are:
# ghcr.io/JValtteri/qure:dev
# ghcr.io/JValtteri/qure:{branch name}
#
#     and on release
#
# ghcr.io/JValtteri/qure:latest
# ghcr.io/JValtteri/qure:{release tag}
#   recommend convention: 'x.x.x' (e.g. '1.10.1' ) )

on:
  push:
    branches: [main, docker]
  release:
    types: [released, prereleased]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node:
          - 22
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      #            #
      #  METADATA  #
      #            #

      - name: Check if event was a release
        id: check_release
        run: |
          echo "IS_RELEASE=${{ github.event_name == 'release' }}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ env.IS_RELEASE }}
            type=raw,value=dev
            type=ref,event=tag

      #                               #
      #      CACHE npm ARTEFACTS      #
      #                               #

      - name: 'Cache node_modules'
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-v${{ matrix.node }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v${{ matrix.node }}-

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      #                          #
      #      BUILD FRONTEND      #
      #                          #
      # Note the build command:  #
      #     'npm run build'      #
      #    doesn't work, but     #
      #  'npx vite build' does   #
      #                          #

      - name: Build Frontend
        working-directory: ./client
        run: |
          npm ci --no-audit --no-fund
          npx vite build

      #                                  #
      #  SETUP DOCKER ENVIRONMENT BUILD  #
      #   for cross platform building    #

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      #                                    #
      #        Cache Docker Layers         #
      # (optional but speeds up rebuilds)  #
      #                                    #
      # build-push supports caching itself #
      # but in the past there has been an  #
      # issue where the cache has grown    #
      # excessively over time.             #
      #                                    #
      # This manual solution fixes that    #
      # issue, while being less clean.     #
      # If the issue is resolved, we can   #
      # remove this step and use:          #
      #                                    #
      # cache-from: type=gha               #
      # cache-to: type=gha,mode=max        #
      # instead.                           #
      #                                    #

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.repository }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      #         #
      #  LOGIN  #
      #         #

      - name: Login to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #                                     #
      #            BUILD & PUSH             #
      #  Creates a single multi-arch image  #
      #                                     #

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # This is to counter the growing cache issue
      # https://github.com/docker/build-push-action/issues/252
      - name: Move cache for next build
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
